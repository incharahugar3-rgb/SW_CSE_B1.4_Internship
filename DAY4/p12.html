<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Selector</title>
    <!-- Targets child elements -->
    <style>
      
        /* Sibling Selector */
        h1+p{
            color:brown;
            background-color:chartreuse;
        }
        h2~p{
            color:brown;
            background-color: aqua;
        }        
    </style>
</head>
<body>
   <p>The very next element:Sibling</p>
   <h1>Heading 1</h1>
   <p>Paragraph a after heading 1</p>
   <p>Paragraph 2</p>
   <h2>Heading 2</h2>
   <p>Paragraph a after heading 2</p>
   <p>Paragraph 3</p>

</body>
</html>
