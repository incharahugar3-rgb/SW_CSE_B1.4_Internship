<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Selector</title>
    <!-- Targets child elements -->
    <style>
      
        /* Child Selector */
        ol>li{
            color:brown;
            background-color: aqua;
        }
    </style>
</head>
<body>
   <ol>
        <li>Laptop</li>
        <li>Mobile phone</li>
        <li>Tablet</li>
   </ol>
</body>
</html>
